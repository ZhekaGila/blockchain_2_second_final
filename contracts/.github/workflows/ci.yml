name: Solidity CI

on:
  push:
  pull_request:

jobs:
  forge-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: forge install

      - name: Build
        run: forge build

      - name: Run tests
        run: forge test -vv

      - name: Coverage
        run: forge coverage