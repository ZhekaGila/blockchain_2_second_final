specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GameItems
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GameItems
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Craft
        - Transfer
      abis:
        - name: GameItems
          file: ../out/GameItems.sol/GameItems.json
      eventHandlers:
        - event: Crafted(indexed address,indexed uint256,indexed uint256,uint256)
          handler: handleCrafted
      file: ./src/mapping.ts
  - kind: ethereum
    name: ResourceAMM
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ResourceAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Pool
        - Swap
        - LiquidityPosition
      abis:
        - name: ResourceAMM
          file: ../out/ResourceAMM.sol/ResourceAMM.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swapped(indexed address,indexed uint256,uint256,uint256,uint256)
          handler: handleSwapped
      file: ./src/mapping.ts
  - kind: ethereum
    name: NFTRentalVault
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: NFTRentalVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Rental
      abis:
        - name: NFTRentalVault
          file: ../out/NFTRentalVault.sol/NFTRentalVault.json
      eventHandlers:
        - event: Listed(indexed address,indexed address,indexed uint256,uint256,uint64)
          handler: handleListed
        - event: Rented(indexed address,indexed address,indexed uint256,uint64)
          handler: handleRented
        - event: Unlisted(indexed address,indexed address,indexed uint256)
          handler: handleUnlisted
      file: ./src/mapping.ts
